<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Task Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.css">
    <style>
        /* --- تعريف الحركات الجديدة --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        body {
            background-color: #FEFCE0; /* Lime background */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* لمنع السكرول وقت ظهور الحركة */
        }

        .login-card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(26, 40, 30, 0.15);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(26, 40, 30, 0.05);
            
            /* تطبيق حركة الظهور للكرت */
            animation: fadeInUp 0.8s ease-out;
        }

        .ui.header {
            color: #1A281E !important; 
            font-weight: 700;
        }

        /* تحريك الحقول بشكل تتابعي */
        .field {
            animation: slideInRight 0.5s ease-out both;
        }
        .field:nth-child(1) { animation-delay: 0.3s; }
        .field:nth-child(2) { animation-delay: 0.5s; }

        /* تغيير لون التركيز (Focus) للون الـ Emerald */
        .ui.form input:focus {
            border-color: #1A281E !important;
            box-shadow: 0 0 8px rgba(26, 40, 30, 0.2) !important;
        }

        /* زر الدخول */
        .ui.emerald.button {
            background-color: #1A281E !important;
            color: #FEFCE0 !important;
            border-radius: 10px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* حركة ارتدادية ناعمة */
            animation: fadeInUp 0.6s ease-out 0.7s both;
        }

        .ui.emerald.button:hover {
            background-color: #2a3d2e !important;
            transform: scale(1.03); /* تكبير بسيط */
            box-shadow: 0 5px 15px rgba(26, 40, 30, 0.3);
        }

        .register-link {
            color: #1A281E;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="ui center aligned icon header">
            <i class="lock icon" style="color: #1A281E;"></i>
            Login
        </h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="ui negative message small">
              {% for message in messages %}
                <p>{{ message }}</p>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form class="ui form" method="POST">
            <div class="field">
                <label>Username</label>
                <div class="ui left icon input">
                    <i class="user icon"></i>
                    <input type="text" name="username" placeholder="Your username" required>
                </div>
            </div>
            <div class="field">
                <label>Password</label>
                <div class="ui left icon input">
                    <i class="key icon"></i>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
            </div>
            <button class="ui emerald fluid large button" type="submit">Access Dashboard</button>
        </form>

        <div class="ui center aligned container" style="margin-top: 20px; animation: fadeInUp 0.5s ease-out 0.9s both;">
            <span style="color: #666;">New here?</span> 
            <a href="/register" class="register-link">Create Account</a>
        </div>
    </div>
</body>
</html>
