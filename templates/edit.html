<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.css">
</head>
<body>
    <div style="margin-top: 100px;" class="ui container">
        <div class="ui segment" style="max-width: 500px; margin: auto;">
            <h2 class="ui header">Edit Task Title</h2>
            <form class="ui form" method="POST">
                <div class="field">
                    <label>New Title</label>
                    <input type="text" name="title" value="{{ todo.title }}" required>
                </div>
                <button class="ui green button" type="submit">Save Changes</button>
                <a href="/" class="ui button">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
