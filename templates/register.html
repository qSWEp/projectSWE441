<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.css">
</head>
<body>
    <div style="margin-top: 100px;" class="ui container">
        <div class="ui segment" style="max-width: 400px; margin: auto;">
            <h2 class="ui header">Register</h2>
            <form class="ui form" method="POST">
                <div class="field">
                    <input type="text" name="username" placeholder="Choose Username" required>
                </div>
                <div class="field">
                    <input type="password" name="password" placeholder="Choose Password" required>
                </div>
                <button class="ui blue fluid button" type="submit">Register</button>
            </form>
            <div style="margin-top: 10px;"><a href="/login">Back to Login</a></div>
        </div>
    </div>
</body>
</html>
